name: Deploy PR Previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        if: github.event.action != 'closed'
        working-directory: website
        run: npm install

      - name: Build with Astro
        if: github.event.action != 'closed'
        working-directory: website
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SITE_URL: "https://${{ github.repository_owner }}.github.io"
          BASE_PATH: "/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/"

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: website/dist/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
